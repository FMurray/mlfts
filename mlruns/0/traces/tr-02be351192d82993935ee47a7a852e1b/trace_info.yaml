  # Log Feedback on an MLflow Trace


  Add human feedback (assessments) to an existing MLflow trace for quality tracking,
  filtering, and evaluation.


  ## Usage


  ```

  /feedback [name] [value] ["rationale"] [--trace-id <id>]

  ```


  **Examples:**

  - `/feedback thumbs_up` — positive feedback on the most recent trace

  - `/feedback rating:positive "great answer"` — feedback with rationale

  - `/feedback quality:poor "hallucinated the API endpoint" --trace-id tr-abc123`
  — feedback on a specific trace


  ## Workflow


  ### 1. Determine the Tracking URI and Experiment


  Read `.claude/settings.json` to find the MLflow environment configuration (tracking
  URI, experiment ID/name). Set these before making any MLflow calls:


  ```bash

  # Check configured environment

  cat .claude/settings.json | jq ''.environment''

  ```


