  | A free-form string identifier for the feedback provider |\n\n**There is no dedicated
  email field.** Instead, the `source_id` field is where you put the user's identity
  — it can be a name, account ID, email, or any identifier you choose. For example:\n\n```python\nhuman_source
  = AssessmentSource(\n    source_type=AssessmentSourceType.HUMAN, source_id=\"expert@company.com\"\n)\n```\n\n**When
  feedback is given via the MLflow UI**, MLflow automatically attaches your user information
  (from your authenticated session) as the `source_id`.\n\n**When feedback is given
  programmatically**, you control what goes in `source_id` — MLflow doesn't auto-populate
