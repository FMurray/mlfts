request_preview: is there a way to search all logged traces that have associated feedback?
request_time: '2026-02-11T00:51:43.316Z'
response_preview: "Yes — `search_traces` supports filtering by feedback directly.
  Here are the key patterns:\n\n### Filter traces that have specific feedback\n\n```python\nimport
  mlflow\n\n# Find traces with a specific feedback value\ntraces = mlflow.search_traces(filter_string=\"feedback.rating
  = 'positive'\")\n\n# Pattern match on feedback content\ntraces = mlflow.search_traces(filter_string=\"feedback.user_comment
  LIKE '%helpful%'\")\n```\n\n### Check if feedback exists at all\n\n```python\n#
  Traces where a specific feedback field is present\ntraces = mlflow.search_traces(filter_string=\"feedback.user_satisfaction
  IS NOT NULL\")\n```\n\n### Combine with other filters\n\n```python\n# Traces with
  positive feedback that were also fast\ntraces = mlflow.search_traces(\n    filter_string=\"\"\"\n
  \       span.name LIKE '%llm%'\n        AND feedback.rating = 'positive'\n        AND
  trace.execution_time_ms < 1000\n    \"\"\"\n)\n```\n\nThe `feedback.<name>` field
  in the filter string corresponds to the `name` parameter you pass to `mlflow.log_feedback()`."
