response_preview: 'Now I have a complete picture. Here''s how the existing Claude
  plugin architecture works and where tagging/feedback fits in:


  ## Current Architecture


  The plugin uses Claude Code''s **Stop hook** system:


  1. **`.claude/settings.json`** registers a `Stop` hook

  2. When a conversation ends, Claude Code calls `stop_hook_handler()` (`hooks.py:194`)

  3. The handler reads the transcript via stdin, calls `process_transcript()` (`tracing.py:568`)

  4. `process_transcript()` creates an MLflow trace with AGENT/LLM/TOOL spans, sets
  metadata (session ID, user, working directory), and exports the trace


  The trace is created entirely **post-hoc** — after the conversation finishes — by
  parsing the JSONL transcript file.


  ## Two Approaches for Tags & Feedback


  ### Option 1: Tags on Traces (simpler, fits current architecture well)


  After `process_transcript()` returns a `Trace` object in `_process_stop_hook()`
  (`hooks.py:167`), you can call:


  ```python

  mlflow.set_trace_tag(trace_id=trace.info.trace_id, key="'
state: OK
